# Dataset settings
dataset_id: "sst2"

# Model settings
model_name: "meta-llama/Llama-3.2-1B"
max_length: 64
dtype: "torch.bfloat16"

# Training hyperparameters
training_type: "adapters"
learning_rate: 1e-4
batch_size: 16
num_epochs: 1
ignored_index: -100

# Adapter setup
adapter_bottleneck_dim: 24
adapter_non_linearity: "torch.nn.GELU"
adapter_layers: []

# Multi-chip settings
parallelism: "single"  # [single, data, tensor]

# Reproducibility settings
seed: 23
deterministic: False

# Logging settings
log_level: "INFO"
use_wandb: True
wandb_project: "llama-adapters-finetuning-xla"
wandb_run_name: "tt-llama-test"
wandb_tags: ["test"]
wandb_watch_mode: "all"
wandb_log_freq: 1000
model_to_wandb: False
steps_freq: 100
val_steps_freq: 100
epoch_freq: 1

# Checkpoint settings
resume_from_checkpoint: False
resume_option: "last"  # [last, best, path]
checkpoint_path: "" # path to checkpoint if resume_option is "path"
checkpoint_metric: "eval/loss"
checkpoint_metric_mode: "min"  # [min, max]
keep_last_n: 3
keep_best_n: 1
save_strategy: "step"
project_dir: "blacksmith/experiments/torch/llama/xla/adapters"
save_optim: False
storage_backend: "local"
sync_to_storage: False
load_from_storage: False
remote_path: ""

# Other settings
framework: "pytorch"
print_examples: True
use_tt: True
