name: Docs - Build & Deploy

on:
  workflow_call:

# Sets permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  build:
    runs-on:
      - ubuntu-latest
    env:
      SEARCH_API_BASE: https://csl860x2oj.execute-api.us-east-2.amazonaws.com/prod
      DOC_CATALOG_SOURCE_ID: docs-tenstorrent
      DOC_SITE_BASE_URL: https://firdovsimammedovk.github.io/tt-blacksmith
      DOCS_ID_NAMESPACE: tt-blacksmith
      DOCS_SEARCH_INGEST_API_KEY: ${{ secrets.DOCS_SEARCH_INGEST_API_KEY_TT_BLACKSMITH }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install documentation dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r docs/requirements.txt

    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@v5

    # Latest at site root; each git tag under /<tag>/ (required for version switcher URLs).
    - name: Build multi-version site
      env:
        DOCS_SEARCH_INGEST_API_KEY: ${{ secrets.DOCS_SEARCH_INGEST_API_KEY_TT_BLACKSMITH }}
      run: bash docs/scripts/build_github_pages.sh

    - name: Skip indexing note when API key is missing
      if: ${{ env.DOCS_SEARCH_INGEST_API_KEY == '' }}
      run: |
        echo "::warning::Skipping remote search indexing because DOCS_SEARCH_INGEST_API_KEY_TT_BLACKSMITH is not set."

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./pages

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
