name: On push

on:
  push:
    branches: [ "main" ]
    # Redeploy docs when you publish a release tag so /v1.0.0/, /v2.0.0/ exist on Pages.
    tags: [ "v*" ]

permissions:
  contents: read
  checks: write
  pages: write
  id-token: write
  deployments: write

jobs:
  test:
    if: github.ref_type == 'branch'
    uses: ./.github/workflows/call-test.yml
    secrets: inherit
    with:
      docker_image: "ghcr.io/tenstorrent/tt-xla/tt-xla-base-ubuntu-24-04:latest"
      use-shared-runners: true
      test_suite: basic-test.json

  deploy-docs:
    uses: ./.github/workflows/call-build-docs.yml
    secrets: inherit
